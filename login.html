<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Resume PRO | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --royal-gold: #c5a059;
            --royal-navy: #0a192f;
            --bg-gradient: linear-gradient(135deg, #020617 0%, #0a192f 100%);
            --card-bg: #112240;
            --box-bg: #1e293b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-gradient); color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

        #loginBox { max-width: 400px; width: 90%; padding: 40px; background: var(--card-bg); border-radius: 20px; border: 1px solid var(--royal-gold); text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .logo { font-size: 2.5rem; color: var(--royal-gold); margin-bottom: 10px; }
        h2 { margin-bottom: 30px; color: var(--royal-gold); }
        .auth-input { width: 100%; padding: 15px; margin-bottom: 15px; background: var(--box-bg); border: 1px solid rgba(197, 160, 89, 0.3); border-radius: 12px; color: white; font-size: 1rem; outline: none; transition: border 0.3s; }
        .auth-input:focus { border-color: var(--royal-gold); box-shadow: 0 0 0 3px rgba(197, 160, 89, 0.1); }
        .auth-btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 1rem; margin-bottom: 15px; transition: all 0.3s; }
        .register-btn { background: var(--royal-gold); color: var(--royal-navy); }
        .register-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(197, 160, 89, 0.4); }
        .login-btn { background: transparent; color: white; border: 2px solid var(--royal-gold); }
        .login-btn:hover { background: var(--royal-gold); color: var(--royal-navy); }
        #authMsg { font-size: 0.9rem; margin-top: 10px; min-height: 20px; }
        .demo-link { margin-top: 20px; color: var(--royal-gold); text-decoration: none; font-weight: 600; }
        .demo-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div id="loginBox">
        <div class="logo">👑</div>
        <h2>Royal Resume PRO</h2>
        <input type="email" id="email" class="auth-input" placeholder="📧 Email Address" required>
        <input type="password" id="password" class="auth-input" placeholder="🔒 Secure Password" required>
        <button onclick="handleRegister()" class="auth-btn register-btn">Create Account</button>
        <button onclick="handleLogin()" class="auth-btn login-btn">Login Securely</button>
        <p id="authMsg"></p>
        <a href="app.html" class="demo-link">🚀 Open Resume Builder (Demo)</a>
    </div>

<script>
const API_BASE = 'http://localhost:5000/api';

function showMessage(msg, type = 'error') {
    const el = document.getElementById('authMsg');
    el.textContent = msg;
    el.style.color = type === 'success' ? '#10b981' : '#ff6b6b';
}

async function handleRegister() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    
    if (!email || !password || password.length < 6) {
        return showMessage('Please use valid email & password (6+ chars)');
    }
    
    try {
        showMessage('Creating account...');
        const res = await fetch(`${API_BASE}/auth/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        
        const data = await res.json();
        
        if (res.ok) {
            localStorage.setItem('royalToken', data.token);
            localStorage.setItem('royalPremium', 'false');
            localStorage.setItem('userEmail', email);
            showMessage('Account created! Redirecting...', 'success');
            setTimeout(() => window.location.href = 'app.html', 1000);
        } else {
            showMessage(data.error || data.msg || 'Registration failed');
        }
    } catch (err) {
        showMessage('Server unavailable. Try again.');
    }
}

async function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    
    if (!email || !password) {
        return showMessage('Please fill all fields');
    }
    
    try {
        showMessage('Logging in...');
        const res = await fetch(`${API_BASE}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        
        const data = await res.json();
        
        if (res.ok) {
            localStorage.setItem('royalToken', data.token);
            localStorage.setItem('royalPremium', 'false');
            localStorage.setItem('userEmail', email);
            showMessage('Welcome back!', 'success');
            setTimeout(() => window.location.href = 'app.html', 1000);
        } else {
            showMessage(data.error || 'Login failed');
        }
    } catch (err) {
        showMessage('Server connection failed');
    }
}

document.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        const passField = document.getElementById('password');
        if (document.activeElement === passField) {
            handleLogin();
        }
    }
});
</script>
</body>
</html>
